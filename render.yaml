services:
  - type: web
    name: whatsapp-receptionist-mvp
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: CUSTOMER_CONFIG_PATH
        value: hebrew-beauty-clinic-config.json
      - key: GREEN_API_BASE_URL
        value: https://api.green-api.com
      - key: GREEN_ID_INSTANCE
        sync: false
      - key: GREEN_API_TOKEN_INSTANCE
        sync: false
      - key: OWNER_ALERT_CHAT_ID
        sync: false

